<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div th:fragment="sidebar" class="p-3">
        <h3 class="mb-4 mt-4 invisible"> Content </h3>
        <div class="bg-light border border-2 shadow-sm p-3 rounded mt-3 mb-3 ms-3 me-3"
             style="position: sticky; top: 20px;">

            <ul class="nav flex-column">
                <li class="nav-item mb-2">
                    <a href="/loans/all" class="nav-link text-dark"
                       th:classappend="${'ALL' == type} ? 'fw-bold' : '' ">
                        All
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a href="/loans/overdue" class="nav-link text-dark"
                       th:classappend="${'OVERDUE' == type} ? 'fw-bold' : '' ">
                        Overdue
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a href="/loans/active" class="nav-link text-dark"
                       th:classappend="${'ACTIVE' == type} ? 'fw-bold' : '' ">
                        Active
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a href="/loans/pending" class="nav-link text-dark"
                       th:classappend="${'PENDING' == type} ? 'fw-bold' : '' ">
                        Pending
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a href="/loans/returned" class="nav-link text-dark"
                       th:classappend="${'RETURNED' == type} ? 'fw-bold' : '' ">
                        Returned
                    </a>
                </li>
            </ul>
        </div>
    </div>
</body>
</html>
