<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:fragment="content" class="p-3">
    <h3 class="mt-4 mb-4">Search Books</h3>

    <div class="row">
        <div class="col-md-6 col-lg-8">
            <form th:action="@{/books/search}" method="get" class="d-flex mb-5">
                <input class="form-control me-2" type="search" name="query" placeholder="Search by book title or author" aria-label="Search">
                <button class="btn btn-outline-primary" type="submit">Search</button>
            </form>
        </div>
    </div>

</div>
</body>
</html>
