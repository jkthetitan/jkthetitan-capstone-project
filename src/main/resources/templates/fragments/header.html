<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<header th:fragment="header" class="navbar border navbar-expand-lg bg-light shadow-sm p-3">
    <div class="container-fluid">

        <div class="d-flex align-items-center gap-3">
            <a href="/" class="me-3">
                <img th:src="@{/images/library.png}" alt="Library Logo" style="height: 40px; width: auto;">
            </a>

            <a href="/" class="text-decoration-none text-dark fw-bold me-3">Home</a>
            <a href="/books" class="text-decoration-none text-dark fw-bold me-3">My Requests</a>
            <a href="/loans/all" class="text-decoration-none text-dark fw-bold me-3">My Books</a>


            <form action="/books/search" method="GET" class="d-flex">
                <input class="form-control me-2" type="search" name="query" placeholder="Search..." aria-label="Search">
            </form>
        </div>

        <div class="d-flex">
            <a href="/login" class="btn btn-success me-2">Login</a>
            <a href="/register" class="btn btn-primary">Sign up</a>
        </div>

    </div>
</header>

</body>
</html>
