<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<div th:fragment="bookCard(book)">
    <div class="card bg-light shadow-sm mb-3">
        <div class="card-body">
            <div class="d-flex">

                <div style="flex: 0 0 150px; padding: 0 15px;">
                    <img th:src="@{${book.getImagePath()}}"
                         class="img-fluid rounded"
                         alt="Book Cover"
                         style="width: 100%; height: 200px; object-fit: cover;">
                </div>

                <div class="flex-grow-1" style="padding: 0 15px;">
                    <h5 class="card-title" th:text="${book.getTitle()}">Book Title</h5>
                    <h6 class="card-subtitle mb-2 text-muted">
                        By <span th:text="${book.getAuthor()}">Author</span>
                    </h6>
                    <p class="card-text mb-1"><strong>Publisher:</strong> <span th:text="${book.getPublisher()}">Publisher</span></p>
                    <p class="card-text mb-1"><strong>Year:</strong> <span th:text="${book.getPublicationYear()}">2025</span></p>
                    <p class="card-text mb-1"><strong>Pages:</strong> <span th:text="${book.getPages()}">564</span></p>
                    <p class="card-text mb-1"><strong>Language:</strong> <span th:text="${book.getLanguage()}">English</span></p>
                </div>

                <div class="d-flex flex-column justify-content-end" style="flex: 0 0 120px; padding: 0 15px;">
                    <a href="/books/view/1" class="btn btn-primary mb-2 w-100">View</a>
                    <a href="#" class="btn btn-success w-100">Request</a>
                </div>

            </div>
        </div>
    </div>
</div>

</html>
