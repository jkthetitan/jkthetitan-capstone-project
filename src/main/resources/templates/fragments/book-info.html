<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:fragment="content" class="container mt-4">
    <div class="card shadow-sm border-0 bg-white">
        <div class="card-body p-0">
            <div class="d-flex" style="min-height: 400px;">

                <div style="flex: 0 0 250px; background-color: #f8f9fa;" class="d-flex align-items-center justify-content-center p-3">
                    <img th:src="@{${book.getImagePath()}}"
                         class="img-fluid rounded shadow-sm"
                         alt="Book Cover"
                         style="width: 100%; max-height: 350px; object-fit: contain;">
                </div>

                <div class="flex-grow-1 p-4 d-flex flex-column">

                    <div class="mb-3">
                        <h2 class="fw-bold" th:text="${book.getTitle()}">Book Title</h2>
                        <h5 class="text-muted">By <span th:text="${book.getAuthor()}">Author Name</span></h5>
                    </div>

                    <div class="flex-grow-1">
                        <div class="row">
                            <div class="col-md-6">
                                <p class="mb-1"><strong>ISBN:</strong> <span th:text="${book.getIsbn()}"></span></p>
                                <p class="mb-1"><strong>Publisher:</strong> <span th:text="${book.getPublisher()}"></span></p>
                                <p class="mb-1"><strong>Year:</strong> <span th:text="${book.getPublicationYear()}"></span></p>
                            </div>
                            <div class="col-md-6">
                                <p class="mb-1"><strong>Pages:</strong> <span th:text="${book.getPages()}"></span></p>
                                <p class="mb-1"><strong>Language:</strong> <span th:text="${book.getLanguage()}"></span></p>
                                <p class="mb-1"><strong>Status:</strong>
                                    <span th:text="${book.getStatus()}"
                                          th:classappend="${book.getAvailableCopies() > 0 ? 'text-success' : 'text-danger'}"
                                          class="fw-bold"></span>
                                </p>
                            </div>
                        </div>

                        <hr>
                        <p class="text-secondary small">
                            <strong>Description:</strong><br>
                            <span th:text="${book.getDescription()}">Description goes here...</span>
                        </p>
                    </div>

                    <div class="mt-auto pt-3 border-top">
                        <div class="d-flex justify-content-between align-items-center">
                            <small class="text-muted">
                                Available Copies: <span th:text="${book.getAvailableCopies()}">0</span>
                            </small>
                            <div class="d-flex gap-2">
                                <button type="button" class="btn btn-primary px-4" onclick="history.back()">Back</button>                                <button class="btn btn-success px-4"
                                        th:disabled="${book.getAvailableCopies() == 0}">Request</button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
