<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content, leftSidebar, rightSidebar)">
<head>
    <meta charset="UTF-8">
    <title>My Website</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/header :: header}"></div>

<div class="container-fluid">
    <div class="row">

        <!-- Left Sidebar -->
        <aside class="col-12 col-md-3 col-lg-2">
            <div th:if="${leftSidebar != null}">
                <div th:replace="~{__${leftSidebar}__}"></div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="col px-5">
            <div th:if="${content != null}">
                <div th:replace="~{__${content}__}"></div>
            </div>
        </main>

        <!-- Right Sidebar -->
        <aside class="col-12 col-md-3 col-lg-2">
            <div th:if="${rightSidebar != null}">
                <div th:replace="~{__${rightSidebar}__}"></div>
            </div>
        </aside>

    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
